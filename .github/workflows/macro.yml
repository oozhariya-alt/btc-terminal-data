name: Update macro
on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium
      - run: python fetch_macro.py
        continue-on-error: true
        id: run_script
      - name: Commit results
        run: |
          git config user.name "gh-actions"
          git config user.email "actions@github.com"
          git add macro.json debug.html 2>/dev/null || true
          git diff --quiet --cached || git commit -m "auto: update macro"
          git push
      - name: Fail if script failed
        if: steps.run_script.outcome == 'failure'
        run: exit 1
